<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies - MovieCloud</title>
    <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a0a;color:#fff;font-family:Arial,sans-serif}
        .header{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:20px;text-align:center;position:sticky;top:0;z-index:100}
        .header h1{font-size:28px;margin-bottom:15px}
        .header h1 span{color:#e50914}
        .search-box{width:80%;max-width:500px;padding:14px 20px;border-radius:25px;border:none;background:#222;color:#fff;font-size:16px;margin:0 auto 15px;display:block;outline:none;border:2px solid transparent;transition:border-color 0.3s}
        .search-box:focus{border-color:#e50914}
        .nav{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
        .nav button{background:#333;font-size:14px;padding:10px 20px;border:none;border-radius:20px;cursor:pointer;font-weight:bold;color:#fff;transition:background .2s}
        .nav button:hover,.nav button.active{background:#e50914}
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:18px;padding:20px;max-width:1400px;margin:0 auto}
        .card{background:#1a1a1a;border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .2s;border:2px solid transparent;position:relative}
        .card:hover{transform:translateY(-8px);border-color:#e50914;box-shadow:0 10px 30px rgba(229,9,20,0.3)}
        .card img{width:100%;aspect-ratio:2/3;object-fit:cover;background:#333}
        .card .info{padding:10px}
        .card .title{font-size:14px;font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .card .year{font-size:11px;color:#999;margin-top:3px}
        .card .badge{display:inline-block;background:#e50914;color:#fff;padding:2px 8px;border-radius:10px;font-size:10px;margin-top:3px}
        .dbtn{position:absolute;top:10px;right:10px;background:rgba(229,9,20,0.9);color:#fff;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;opacity:0;transition:opacity .3s;cursor:pointer;z-index:5}
        .card:hover .dbtn{opacity:1}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.97);z-index:1000}
        .modal-content{width:95%;max-width:1100px;margin:15px auto;background:#000;border-radius:12px;overflow:hidden;position:relative}
        .close{position:absolute;top:12px;right:12px;background:rgba(0,0,0,0.8);color:#fff;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:10;font-size:22px;border:2px solid rgba(255,255,255,0.3)}
        .close:hover{background:#e50914}
        video{width:100%;max-height:70vh;background:#000;display:block}
        .controls{padding:15px 20px;background:#111;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
        button{padding:10px 20px;border:none;border-radius:20px;cursor:pointer;font-weight:bold;background:#e50914;color:#fff;transition:opacity .2s;font-size:13px}
        button:hover{opacity:0.85}
        .qbtn{background:#333}
        .qbtn.active,.qbtn:hover{background:#e50914}
        .dashbtn{background:#8b5cf6!important}
        .dashbtn:hover,.dashbtn.active{background:#7c3aed!important}
        .dlbtn{background:#28a745!important;font-weight:bold}
        .dlbtn:hover{background:#1e7e34!important}
        .loading-text{text-align:center;padding:60px;color:#666;font-size:18px}
        .spinner{display:inline-block;width:40px;height:40px;border:3px solid #333;border-top-color:#e50914;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:15px}
        @keyframes spin{to{transform:rotate(360deg)}}
        @media(max-width:600px){.grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;padding:12px}}
    </style>
</head>
<body>
    <div class="header">
        <h1>🎬 <span>Movies</span></h1>
        <input type="text" class="search-box" id="searchInput" placeholder="🔍 Search movies..." onkeydown="if(event.key==='Enter')searchMovies()">
        <div class="nav">
            <button onclick="loadMovies('home')" class="active" id="btnHome">🏠 Featured</button>
            <button onclick="loadMovies('movies')" id="btnMovies">🎥 All Movies</button>
            <button onclick="loadMovies('animation')" id="btnAnim">✨ Animation</button>
        </div>
    </div>

    <div class="grid" id="grid"><div class="loading-text"><div class="spinner"></div>Loading movies...</div></div>

    <div class="modal" id="playerModal">
        <div class="modal-content">
            <span class="close" onclick="closePlayer()">✕</span>
            <video id="video" controls autoplay></video>
            <div class="controls" id="controls"></div>
        </div>
    </div>

    <script>
        const API = 'https://moviecloud-api.onrender.com';
        let streams = [], movie = null, activeQ = null, dashPlayer = null;

        window.onload = () => loadMovies('home');

        function setActiveBtn(id) {
            ['btnHome','btnMovies','btnAnim'].forEach(b => {
                const el = document.getElementById(b);
                if (el) el.classList.remove('active');
            });
            const btn = document.getElementById(id);
            if (btn) btn.classList.add('active');
        }

        async function loadMovies(type) {
            setActiveBtn(type === 'home' ? 'btnHome' : type === 'movies' ? 'btnMovies' : 'btnAnim');
            const grid = document.getElementById('grid');
            grid.innerHTML = '<div class="loading-text"><div class="spinner"></div>Loading...</div>';
            try {
                let d;
                if (type === 'home') { const r = await fetch(API + '/home'); d = await r.json(); showMovies(d); }
                else if (type === 'movies') { const r = await fetch(API + '/movies'); d = await r.json(); showItems(d.items); }
                else { const r = await fetch(API + '/animation'); d = await r.json(); showItems(d.items); }
            } catch (e) {
                grid.innerHTML = '<div class="loading-text" style="color:red;">Failed to load movies</div>';
                console.error(e);
            }
        }

        async function searchMovies() {
            const q = document.getElementById('searchInput').value.trim();
            if (!q) return;
            setActiveBtn(null);
            const grid = document.getElementById('grid');
            grid.innerHTML = '<div class="loading-text"><div class="spinner"></div>Searching...</div>';
            try {
                const r = await fetch(API + '/search?q=' + encodeURIComponent(q));
                const d = await r.json();
                if (d.items && d.items.length) showItems(d.items);
                else grid.innerHTML = '<div class="loading-text">No results for "' + q + '"</div>';
            } catch (e) {
                grid.innerHTML = '<div class="loading-text" style="color:red;">Search failed</div>';
            }
        }

        function showMovies(d) {
            const grid = document.getElementById('grid'); grid.innerHTML = '';
            if (d.sections) d.sections.forEach(s => { if (s.items) s.items.forEach(m => { if (m.poster_url) grid.appendChild(card(m)); }); });
        }

        function showItems(items) {
            const grid = document.getElementById('grid'); grid.innerHTML = '';
            if (items) items.forEach(m => { if (m.poster_url) grid.appendChild(card(m)); });
        }

        function card(m) {
            const c = document.createElement('div'); c.className = 'card';
            const db = document.createElement('span'); db.className = 'dbtn'; db.textContent = '⬇'; db.title = 'Download';
            db.onclick = e => { e.stopPropagation(); downloadMovie(m); };
            c.appendChild(db);
            const co = document.createElement('div');
            co.onclick = () => playMovie(m);
            co.innerHTML = `<img src="${m.poster_url}" onerror="this.style.background='#333'" loading="lazy">
                <div class="info"><div class="title">${m.name || 'Unknown'}</div>
                <div class="year">${m.year || ''} ${m.rating ? '⭐'+m.rating : ''}</div>
                ${m.badge ? `<span class="badge">${m.badge}</span>` : ''}</div>`;
            c.appendChild(co);
            return c;
        }

        async function playMovie(m) {
            if (!m.subject_id || !m.slug) { alert('Missing movie data'); return; }
            movie = m;
            destroyDash();
            document.getElementById('playerModal').style.display = 'block';
            document.getElementById('controls').innerHTML = '<span style="color:#fff;">Loading streams for ' + (m.name || 'movie') + '...</span>';
            await fetchStreams(m.subject_id, m.slug);
        }

        async function fetchStreams(sid, slug) {
            const ctr = document.getElementById('controls');
            try {
                const r = await fetch(`${API}/api/stream/${sid}?detail_path=${encodeURIComponent(slug)}&se=0&ep=0`);
                const d = await r.json();
                
                const mp4Sources = (d.sources || []).filter(s => s.format === 'MP4' || !s.format);
                const dashSources = d.dash || [];
                
                if (mp4Sources.length === 0 && dashSources.length === 0) {
                    ctr.innerHTML = '<span style="color:red;">❌ No streams available for this movie</span>';
                    return;
                }
                
                streams = mp4Sources;
                ctr.innerHTML = '<span style="color:#fff;">🎬 ' + (movie?.name || 'Movie') + '</span>';
                
                if (mp4Sources.length > 0) {
                    const ql = document.createElement('span'); ql.style.cssText = 'color:#fff;margin:0 8px;'; ql.textContent = 'MP4:'; ctr.appendChild(ql);
                    mp4Sources.forEach((s, i) => {
                        const b = document.createElement('button'); b.className = 'qbtn';
                        b.textContent = s.resolution || '?';
                        b.onclick = () => switchToMp4(i, b);
                        ctr.appendChild(b);
                    });
                }
                
                if (dashSources.length > 0) {
                    const dashBtn = document.createElement('button');
                    dashBtn.className = 'qbtn dashbtn';
                    dashBtn.textContent = '🎬 DASH ' + (dashSources[0].resolutions || 'HD');
                    dashBtn.onclick = () => switchToDash(dashSources[0], dashBtn);
                    ctr.appendChild(dashBtn);
                }
                
                const dl = document.createElement('button'); dl.className = 'qbtn dlbtn'; dl.textContent = '⬇️ Download';
                dl.onclick = () => { document.getElementById('playerModal').style.display = 'none'; downloadMovie(movie); };
                ctr.appendChild(dl);
                
                if (mp4Sources.length > 0) {
                    const bestIdx = mp4Sources.length - 1;
                    const bestBtn = ctr.querySelectorAll('.qbtn:not(.dashbtn):not(.dlbtn)')[bestIdx];
                    switchToMp4(bestIdx, bestBtn);
                } else if (dashSources.length > 0) {
                    const dashBtn = ctr.querySelector('.dashbtn');
                    switchToDash(dashSources[0], dashBtn);
                }
                
            } catch (e) {
                ctr.innerHTML = '<span style="color:red;">Failed to load streams</span>';
                console.error(e);
            }
        }

        function switchToMp4(index, btn) {
            destroyDash();
            if (activeQ) activeQ.classList.remove('active');
            if (btn) { btn.classList.add('active'); activeQ = btn; }
            const v = document.getElementById('video');
            if (streams[index] && movie) {
                const q = streams[index].resolution || '480p';
                const url = `${API}/stream-proxy/${movie.subject_id}?detail_path=${encodeURIComponent(movie.slug)}&quality=${q}&se=0&ep=0`;
                v.src = url; v.load(); v.play().catch(() => {});
            }
        }

        function switchToDash(dashSource, btn) {
            destroyDash();
            if (activeQ) activeQ.classList.remove('active');
            if (btn) { btn.classList.add('active'); activeQ = btn; }
            const v = document.getElementById('video');
            try {
                dashPlayer = dashjs.MediaPlayer().create();
                dashPlayer.initialize(v, dashSource.url, true);
                dashPlayer.setAutoPlay(true);
            } catch(e) {
                console.error('DASH error:', e);
                v.src = dashSource.url; v.load(); v.play().catch(() => {});
            }
        }

        function destroyDash() {
            if (dashPlayer) { dashPlayer.destroy(); dashPlayer = null; }
            const v = document.getElementById('video');
            v.pause(); v.removeAttribute('src'); v.load();
        }

        function closePlayer() {
            destroyDash();
            document.getElementById('playerModal').style.display = 'none';
            streams = []; movie = null; activeQ = null;
        }

        function downloadMovie(m) {
            if (!m || !m.subject_id) return;
            const dqual = '480p';
            const url = `${API}/download/${m.subject_id}?detail_path=${encodeURIComponent(m.slug)}&quality=${dqual}&se=0&ep=0`;
            const a = document.createElement('a');
            a.href = url;
            a.download = `${(m.name || 'movie').replace(/[^a-z0-9]/gi, '_')}_${dqual}.mp4`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
        }

        document.addEventListener('keydown', e => { if (e.key === 'Escape') closePlayer(); });
        document.getElementById('playerModal').addEventListener('click', function(e) { if (e.target === this) closePlayer(); });
    </script>
</body>
</html>
